services:
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${PBPK_S3_SMOKE_HOST:-127.0.0.1}:${PBPK_S3_SMOKE_PORT:-9000}:9000"
      - "${PBPK_S3_SMOKE_HOST:-127.0.0.1}:${PBPK_S3_SMOKE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until /usr/bin/mc alias set smoke http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}";
        do sleep 1; done;
        /usr/bin/mc mb --ignore-existing "smoke/${AUDIT_S3_BUCKET:-pbpk-mcp-audit-smoke}";
        exit 0
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AUDIT_S3_BUCKET: ${AUDIT_S3_BUCKET:-pbpk-mcp-audit-smoke}

  api:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_S3_BUCKET: ${AUDIT_S3_BUCKET:-pbpk-mcp-audit-smoke}
      AUDIT_S3_PREFIX: ${AUDIT_S3_PREFIX:-bridge/audit}
      AUDIT_S3_REGION: ${AUDIT_S3_REGION:-us-east-1}
      AUDIT_S3_ENDPOINT_URL: ${AUDIT_S3_ENDPOINT_URL:-http://minio:9000}
      AUDIT_S3_FORCE_PATH_STYLE: ${AUDIT_S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AUDIT_S3_REGION:-us-east-1}

  worker:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_S3_BUCKET: ${AUDIT_S3_BUCKET:-pbpk-mcp-audit-smoke}
      AUDIT_S3_PREFIX: ${AUDIT_S3_PREFIX:-bridge/audit}
      AUDIT_S3_REGION: ${AUDIT_S3_REGION:-us-east-1}
      AUDIT_S3_ENDPOINT_URL: ${AUDIT_S3_ENDPOINT_URL:-http://minio:9000}
      AUDIT_S3_FORCE_PATH_STYLE: ${AUDIT_S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: ${AUDIT_S3_REGION:-us-east-1}

volumes:
  minio-data:
