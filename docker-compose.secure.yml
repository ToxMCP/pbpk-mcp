# =============================================================================
# PBPK-MCP Secure Runtime Overlay
# =============================================================================
# This is an *opt-in* security-hardening overlay for docker-compose.celery.yml.
# It adds seccomp, capability restrictions, read-only rootfs, and resource
# limits without changing application code.
#
# Usage:
#   docker compose -f docker-compose.celery.yml -f docker-compose.secure.yml up -d
#
# Review the seccomp profile (docker/pbpk-seccomp.json) before deploying to
# ensure it covers any new syscalls introduced by R/Python package updates.
# =============================================================================

services:
  api:
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/pbpk-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /var/tmp:noexec,nosuid,size=256m
    mem_limit: 4g
    cpus: "2.0"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Ensure the api service is bound to localhost by default in secure mode
    ports:
      - "${PBPK_BIND_HOST:-127.0.0.1}:${PBPK_BIND_PORT:-8000}:8000"

  worker:
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/pbpk-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
      - /var/tmp:noexec,nosuid,size=256m
    mem_limit: 6g
    cpus: "2.0"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Workers do not need external network exposure
    networks:
      - toxmcp-internal

  redis:
    # Harden the Redis sidecar as well
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    mem_limit: 512m
    cpus: "0.5"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - toxmcp-internal

networks:
  toxmcp-internal:
    internal: true
    driver: bridge
