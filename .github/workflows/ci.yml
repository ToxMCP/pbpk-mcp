name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run lint
        run: make lint

  runtime-contract:
    name: Runtime Contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Compile patch-first runtime files
        run: make runtime-patch-check

      - name: MCP tool conformance baseline (advisory)
        # Track-A mcp-conformance gate: spawns the built app and asserts the
        # live, advertised MCP tools/list surface equals the committed expected
        # set (both viewer and operator+admin role views). Advisory under the
        # GitHub Free plan (no required checks); enforced by merge discipline.
        run: python -m unittest -v tests.test_mcp_tool_conformance

      - name: Run runtime contract tests
        run: make runtime-contract-test

      - name: Retain validated distribution artifacts
        run: |
          python scripts/check_distribution_artifacts.py \
            --artifact-dir dist \
            --report-path dist/runtime-contract-report.json

      - name: Upload runtime contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbpk-runtime-contract-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/runtime-contract-report.json
          if-no-files-found: error
          retention-days: 14
