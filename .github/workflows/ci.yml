name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run lint
        run: make lint

  runtime-contract:
    name: Runtime Contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Compile patch-first runtime files
        run: make runtime-patch-check

      - name: MCP tool conformance baseline (advisory)
        # Track-A mcp-conformance gate: spawns the built app and asserts the
        # live, advertised MCP tools/list surface equals the committed expected
        # set (both viewer and operator+admin role views). Advisory under the
        # GitHub Free plan (no required checks); enforced by merge discipline.
        run: python -m unittest -v tests.test_mcp_tool_conformance

      - name: Run runtime contract tests
        run: make runtime-contract-test

      - name: Retain validated distribution artifacts
        run: |
          python scripts/check_distribution_artifacts.py \
            --artifact-dir dist \
            --report-path dist/runtime-contract-report.json

      - name: Upload runtime contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbpk-runtime-contract-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/runtime-contract-report.json
          if-no-files-found: error
          retention-days: 14

  scientific-invariants:
    # Track-B scientific-invariants gate: project the RELEASED pbpkQualificationSummary
    # onto the canonical schema-spine InternalExposureSummary shape and run the
    # vendored, digest-pinned spine policy engine over the projection via a
    # fail-closed Python bridge. ADDITIVE + advisory (its own uv side-toolchain; it
    # touches no PBPK src/, no schemas/, no contract artifacts, and does NOT dispatch
    # or modify the release-artifacts / model-smoke workflows, so those gates are
    # untouched). PROMOTE-TO-BLOCKING: when this repo gains branch protection /
    # rulesets, mark this job a required status check — the gate already exits
    # non-zero on any blocking code. See
    # docs/governance/adr/0001-track-b-scientific-invariants-gate.md.
    name: Scientific invariants (Track-B spine gate)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node (vendored spine policy engine runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up uv (isolated Python side-toolchain)
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Verify vendored spine engine digests (vendor:verify)
        run: uv run --no-project python scripts/vendor_verify.py

      - name: Run the scientific-invariants gate (pristine corpus must be green)
        run: uv run --no-project python scripts/scientific_invariants_gate.py

      - name: Run governance gate tests (per-code bites + source-contract guard + fail-closed)
        run: uv run --with pytest --no-project python -m pytest tests/governance -q
