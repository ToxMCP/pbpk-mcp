services:
  api:
    environment:
      AUTH_ALLOW_ANONYMOUS: "false"
      ENVIRONMENT: production
      AUTH_ISSUER_URL: ${AUTH_ISSUER_URL:?Set AUTH_ISSUER_URL for hardened deployment}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:?Set AUTH_AUDIENCE for hardened deployment}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:?Set AUTH_JWKS_URL for hardened deployment}
      AUDIT_STORAGE_BACKEND: ${AUDIT_STORAGE_BACKEND:-local}
      AUDIT_S3_BUCKET: ${AUDIT_S3_BUCKET:-}
      AUDIT_S3_PREFIX: ${AUDIT_S3_PREFIX:-audit-trail}
      AUDIT_S3_REGION: ${AUDIT_S3_REGION:-}
      AUDIT_S3_ENDPOINT_URL: ${AUDIT_S3_ENDPOINT_URL:-}
      AUDIT_S3_FORCE_PATH_STYLE: ${AUDIT_S3_FORCE_PATH_STYLE:-false}
      AUDIT_S3_OBJECT_LOCK_MODE: ${AUDIT_S3_OBJECT_LOCK_MODE:-}
      AUDIT_S3_OBJECT_LOCK_DAYS: ${AUDIT_S3_OBJECT_LOCK_DAYS:-}
      AUDIT_S3_KMS_KEY_ID: ${AUDIT_S3_KMS_KEY_ID:-}
      AUDIT_VERIFY_LOOKBACK_DAYS: ${AUDIT_VERIFY_LOOKBACK_DAYS:-1}
    ports:
      - "${PBPK_BIND_HOST:-127.0.0.1}:${PBPK_BIND_PORT:-8000}:8000"

  worker:
    environment:
      AUTH_ALLOW_ANONYMOUS: "false"
      ENVIRONMENT: production
      AUTH_ISSUER_URL: ${AUTH_ISSUER_URL:?Set AUTH_ISSUER_URL for hardened deployment}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:?Set AUTH_AUDIENCE for hardened deployment}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:?Set AUTH_JWKS_URL for hardened deployment}
      AUDIT_STORAGE_BACKEND: ${AUDIT_STORAGE_BACKEND:-local}
      AUDIT_S3_BUCKET: ${AUDIT_S3_BUCKET:-}
      AUDIT_S3_PREFIX: ${AUDIT_S3_PREFIX:-audit-trail}
      AUDIT_S3_REGION: ${AUDIT_S3_REGION:-}
      AUDIT_S3_ENDPOINT_URL: ${AUDIT_S3_ENDPOINT_URL:-}
      AUDIT_S3_FORCE_PATH_STYLE: ${AUDIT_S3_FORCE_PATH_STYLE:-false}
      AUDIT_S3_OBJECT_LOCK_MODE: ${AUDIT_S3_OBJECT_LOCK_MODE:-}
      AUDIT_S3_OBJECT_LOCK_DAYS: ${AUDIT_S3_OBJECT_LOCK_DAYS:-}
      AUDIT_S3_KMS_KEY_ID: ${AUDIT_S3_KMS_KEY_ID:-}
      AUDIT_VERIFY_LOOKBACK_DAYS: ${AUDIT_VERIFY_LOOKBACK_DAYS:-1}
